<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Clear Code Image Evidence</title>
    <link rel="stylesheet" href="../partials/backgrounds.css" />
    <link rel="stylesheet" href="../partials/cards.css" />
    <style>
      body { margin: 0; display: grid; background: #ece6dd; }
      body { scrollbar-width: none; }
      body::-webkit-scrollbar { display: none; }
      .stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
      .cc-article-scene .cc-badge, .cc-article-scene .cc-source-media, .cc-article-scene .cc-media-copy { opacity: 1; }
    </style>
  </head>
  <body>
    <section class="stage cc-theme cc-bg-warm-canvas">
      <div class="cc-article-scene">
        <div class="cc-page cc-layout-media-focus">
          <article class="cc-card-image-evidence">
            <div class="cc-badge">Source Image</div>
            <div class="cc-source-media"><img src="../../../assets/previews/clear-code.png" alt="清爽工具说明模板预览截图" /></div>
            <div class="cc-media-copy">
              <div class="cc-media-caption">来源图像保持可读，结论保持简洁。</div>
              <div class="cc-media-meta">原文章节配图 / 本地资源 / 支撑当前正文观点</div>
            </div>
          </article>
        </div>
      </div>
    </section>
    <section class="stage cc-theme cc-bg-warm-canvas">
      <div class="cc-article-scene">
        <div class="cc-page cc-layout-split-media">
          <article class="cc-card-image-evidence">
            <div class="cc-source-media"><img src="../../../assets/previews/clear-code.png" alt="清爽工具说明模板预览截图" /></div>
            <div class="cc-media-copy">
              <div class="cc-badge">Tool Note</div>
              <div class="cc-media-caption">图片和说明各有职责。</div>
              <div class="cc-media-meta">图片呈现原始界面，文字只说明它如何验证本节描述。</div>
            </div>
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
