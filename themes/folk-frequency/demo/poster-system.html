<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folk Frequency Poster System</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="demo.css" />
  </head>
  <body>
    <div class="preview-frame">
      <section class="stage folk-demo-scene ff-bg-floral-fest">
        <div class="ff-article-scene ff-poster-copy-layout">
          <div class="ff-page ff-hook-page">
            <div class="ff-poster-copy centered">
              <div class="ff-page-badge">HOOK PAGE</div>
              <h1 class="ff-poster-title">Festival of Ideas</h1>
              <div class="ff-poster-kicker">拆解文章，生成完整视频</div>
              <p class="ff-poster-subtitle">大标题直接落在纸面上，Logo、正文和 Follow 使用同一套民俗海报语言。</p>
              <div class="ff-bottom-bar">
                <div class="ff-bottom-pill">Script</div>
                <div class="ff-bottom-pill">Cards</div>
                <div class="ff-bottom-pill">Timeline</div>
              </div>
            </div>
            <div class="ff-page-brand">Folk Frequency<span>Visual Style System</span></div>
          </div>
        </div>
      </section>
    </div>

    <div class="preview-frame" style="margin-top: 28px;">
      <section class="stage folk-demo-scene ff-bg-night-folk">
        <div class="ff-article-scene ff-poster-copy-layout">
          <div class="ff-page ff-hook-page">
            <div class="ff-poster-copy">
              <div class="ff-page-badge">QUOTE PAGE</div>
              <h1 class="ff-poster-title">Rooted Signal</h1>
              <p class="ff-poster-subtitle">深蓝边框用于强观点、引用和情绪收束；quote 面板由 HTML 渲染。</p>
            </div>
            <div class="ff-dashed-panel">
              <h2 class="ff-title">“信息要有温度，也要有结构。”</h2>
              <p class="ff-subtitle">适合文章里的核心判断或结尾金句。</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
