<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Folk Frequency Image Evidence</title>
    <link rel="stylesheet" href="../partials/backgrounds.css" />
    <link rel="stylesheet" href="../partials/cards.css" />
    <style>
      body { margin: 0; display: grid; background: #efe0ca; }
      body { scrollbar-width: none; }
      body::-webkit-scrollbar { display: none; }
      .stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
    </style>
  </head>
  <body>
    <section class="stage ff-bg-floral-fest">
      <div class="ff-article-scene ff-media-focus-layout">
        <article class="ff-card-image-evidence">
          <div class="ff-page-badge">SOURCE IMAGE</div>
          <div class="ff-source-media"><img src="../../../assets/previews/folk-frequency.png" alt="民俗海报模板预览截图" /></div>
          <div class="ff-media-copy">
            <div class="ff-media-caption">一张来源照片，一份印刷说明</div>
            <div class="ff-media-meta">原文章节配图 / 正文证据</div>
          </div>
        </article>
      </div>
    </section>
    <section class="stage ff-bg-floral-fest">
      <div class="ff-article-scene ff-split-media-layout">
        <article class="ff-card-image-evidence">
          <div class="ff-source-media"><img src="../../../assets/previews/folk-frequency.png" alt="民俗海报模板预览截图" /></div>
          <div class="ff-media-copy">
            <div class="ff-page-badge">FIELD NOTE</div>
            <div class="ff-media-caption">图片和标签共同讲清这一节</div>
            <div class="ff-media-meta">支撑观点：图像是原文信息，不是临时绘制的场景背景。</div>
          </div>
        </article>
      </div>
    </section>
  </body>
</html>
