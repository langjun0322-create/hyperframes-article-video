<template id="folk-frequency-follow-outro-template">
  <div data-composition-id="folk-frequency-follow-outro" data-width="1920" data-height="1080" data-duration="4.5">
    <link rel="stylesheet" href="../partials/folk-frequency.css" />
    <div class="folk-brand-scene ff-bg-floral-fest">
      <div class="ff-ink-distress" data-layout-ignore aria-hidden="true"></div>
      <div class="folk-follow-card">
        <div class="folk-follow-avatar">
          <img src="../../../assets/branding/follow-avatar.png" alt="Brand avatar" />
        </div>
        <div>
          <div class="folk-follow-eyebrow">FOLLOW / STAY CLOSE</div>
          <div class="folk-follow-title" data-brand-field="follow_title">Follow JunEr</div>
          <div class="folk-follow-subtitle" data-brand-field="follow_subtitle">更多 OpenClaw 更新和 AI Agent 实战拆解</div>
          <div class="folk-follow-handle" data-brand-field="handle">@JunEr</div>
        </div>
        <div class="folk-follow-button" data-brand-field="cta_text">
          <span class="folk-follow-idle">+ Follow</span>
          <span class="folk-follow-done">Following</span>
        </div>
      </div>
    </div>
    <script src="../../../assets/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var root = document.querySelector('[data-composition-id="folk-frequency-follow-outro"]');
      var q = function (selector) { return root.querySelectorAll(selector); };
      var folkFollowOutro = gsap.timeline({ paused: true });
      gsap.set(q('.folk-follow-card'), { opacity: 0, y: 34, rotation: -3, scale: 0.98 });
      gsap.set(q('.folk-follow-avatar'), { opacity: 0, x: -24, scale: 0.92 });
      gsap.set(q('.folk-follow-eyebrow, .folk-follow-title, .folk-follow-subtitle, .folk-follow-handle'), { opacity: 0, y: 14 });
      gsap.set(q('.folk-follow-button'), { opacity: 0, scale: 1.18, rotation: 2 });
      gsap.set(q('.folk-follow-done'), { opacity: 0, y: 8 });
      folkFollowOutro.to(q('.folk-follow-card'), { opacity: 1, y: 0, rotation: 0, scale: 1, duration: 0.54, ease: 'back.out(1.22)' }, 0.22);
      folkFollowOutro.to(q('.folk-follow-avatar'), { opacity: 1, x: 0, scale: 1, duration: 0.38, ease: 'back.out(1.28)' }, 0.46);
      folkFollowOutro.to(q('.folk-follow-eyebrow, .folk-follow-title, .folk-follow-subtitle, .folk-follow-handle'), { opacity: 1, y: 0, duration: 0.30, stagger: 0.06, ease: 'power3.out' }, 0.62);
      folkFollowOutro.to(q('.folk-follow-button'), { opacity: 1, scale: 1, rotation: 0, duration: 0.30, ease: 'back.out(1.5)' }, 1.00);
      folkFollowOutro.to(q('.folk-follow-button'), { scale: 0.92, duration: 0.10, ease: 'power2.out' }, 1.58);
      folkFollowOutro.to(q('.folk-follow-idle'), { opacity: 0, y: -8, duration: 0.16, ease: 'power2.out' }, 1.66);
      folkFollowOutro.to(q('.folk-follow-done'), { opacity: 1, y: 0, duration: 0.20, ease: 'power2.out' }, 1.70);
      folkFollowOutro.to(q('.folk-follow-button'), { scale: 1, backgroundColor: '#2E6B4E', boxShadow: '7px 7px 0 rgba(35,61,122,0.24)', duration: 0.22, ease: 'power2.out' }, 1.70);
      folkFollowOutro.to(q('.folk-follow-card'), { opacity: 0, y: -20, duration: 0.34, ease: 'power2.in' }, 4.10);
      window.__timelines['folk-frequency-follow-outro'] = folkFollowOutro;
    </script>
  </div>
</template>
