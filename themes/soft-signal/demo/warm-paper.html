<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soft Signal Warm Paper</title>
    <link rel="stylesheet" href="../partials/backgrounds.css" />
    <link rel="stylesheet" href="../partials/cards.css" />
    <link rel="stylesheet" href="demo.css" />
  </head>
  <body>
    <div class="preview-frame">
      <section class="stage soft-scene ss-bg-botanical-signal">
        <div class="ss-grain-overlay" aria-hidden="true"></div>
        <div class="arch-window"></div>
        <div class="soft-blob-cluster" aria-hidden="true">
          <div class="soft-blob sage"></div>
          <div class="soft-blob rose"></div>
          <div class="soft-blob gold"></div>
        </div>
        <div class="scene-inner">
          <div class="scene-kicker">Soft Signal / Warm Paper</div>
          <h1 class="hero-title">把复杂内容讲得更柔和</h1>
          <p class="hero-copy">适合教程、个人品牌、生活方式和温暖解释类视频。声音讲大意，画面承载细节，整体保持低压、清楚、有呼吸感。</p>
          <div class="tag-row">
            <span class="tag">warm_paper</span>
            <span class="tag">soft_blobs</span>
            <span class="tag">paper grain</span>
          </div>
          <div class="warm-cards">
            <article class="panel warm-card">
              <h3>核心观点</h3>
              <p>先把文章压缩成一句温和但明确的结论，让观众知道为什么继续看。</p>
            </article>
            <article class="panel warm-card">
              <h3>画面信息</h3>
              <p>卡片里保留标题、说明、证据和标签，避免只有一句话导致画面空。</p>
            </article>
            <article class="panel warm-card">
              <h3>动效方向</h3>
              <p>使用轻微上浮、纸张展开、色块缓慢呼吸，不做强烈科技闪烁。</p>
            </article>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
