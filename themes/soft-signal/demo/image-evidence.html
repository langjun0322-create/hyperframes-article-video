<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Soft Signal Image Evidence</title>
    <link rel="stylesheet" href="../partials/backgrounds.css" />
    <link rel="stylesheet" href="../partials/cards.css" />
    <style>
      body { margin: 0; display: grid; background: #e7decf; }
      body { scrollbar-width: none; }
      body::-webkit-scrollbar { display: none; }
      .stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
    </style>
  </head>
  <body>
    <section class="stage ss-bg-warm-paper">
      <div class="ss-article-scene ss-media-focus-layout">
        <article class="ss-card-image-evidence">
          <div class="ss-eyebrow">Source Image / Media Focus</div>
          <div class="ss-source-media"><img src="../../../assets/previews/soft-signal.png" alt="柔和模板预览截图" /></div>
          <div class="ss-media-copy">
            <div class="ss-media-caption">来自原文的一张图，被安静地装裱为证据。</div>
            <div class="ss-media-meta">原文章节配图 / 说明正文结论，而不是装饰背景。</div>
          </div>
        </article>
      </div>
    </section>
    <section class="stage ss-bg-warm-paper">
      <div class="ss-article-scene ss-split-media-layout">
        <article class="ss-card-image-evidence">
          <div class="ss-source-media"><img src="../../../assets/previews/soft-signal.png" alt="柔和模板预览截图" /></div>
          <div class="ss-media-copy">
            <div class="ss-eyebrow">Editorial Note</div>
            <div class="ss-media-caption">配图和解释在同一页相互照应。</div>
            <div class="ss-media-meta">图像保留出处；侧边注释只提炼与当前段落有关的观点。</div>
          </div>
        </article>
      </div>
    </section>
  </body>
</html>
