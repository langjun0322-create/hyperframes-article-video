<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Tech Signal Hook Demo</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../partials/universal-tech.css" />
    <link rel="stylesheet" href="../partials/backgrounds.css" />
  </head>
  <body>
    <main
      class="hf-scene ts-bg-orbital-signal hook-layout"
      data-composition-id="tech-signal-hook-demo"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="ts-element-scan-band" aria-hidden="true" data-layout-ignore></div>
      <div class="scene-content hook-hero">
        <div class="hook-title-block">
          <div class="eyebrow">DEEPSEEK / API PRICING</div>
          <div class="title"><span style="color: var(--cyan);">0.02 元</span><br />百万 tokens</div>
          <div class="subtitle">文章从一次永久折扣公告，展开对全球 AI 价格竞争的判断。</div>
        </div>
        <div class="hook-orbit-card">
          <div class="planet-arc" aria-hidden="true"></div>
          <div class="release-chip-stack">
            <div class="release-chip glass">
              <div class="chip-title">永久折扣</div>
              <div class="chip-detail">原文的第一项视觉证据。</div>
            </div>
            <div class="release-chip glass">
              <div class="chip-title">价格对比</div>
              <div class="chip-detail">36x / 108x / 1800x。</div>
            </div>
            <div class="release-chip glass">
              <div class="chip-title">生态位</div>
              <div class="chip-detail">文章最后的长期判断。</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
