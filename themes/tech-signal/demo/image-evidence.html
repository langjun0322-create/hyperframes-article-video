<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Tech Signal Image Evidence</title>
    <link rel="stylesheet" href="../partials/backgrounds.css" />
    <link rel="stylesheet" href="../partials/cards.css" />
    <style>
      body { margin: 0; display: grid; background: #060a10; }
      body { scrollbar-width: none; }
      body::-webkit-scrollbar { display: none; }
      .stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
    </style>
  </head>
  <body>
    <section class="stage ts-bg-dark-grid">
      <div class="ts-article-scene ts-media-focus-layout">
        <article class="ts-card-image-evidence">
          <div class="ts-eyebrow">Source Image / Media Focus</div>
          <div class="ts-source-media"><img src="../../../assets/previews/tech-signal.png" alt="科技模板预览截图" /></div>
          <div class="ts-media-copy">
            <div class="ts-media-caption">原文截图成为本幕的主要证据</div>
            <div class="ts-media-meta">来源：原文章节配图 / 支撑观点：生成结果沿用文章的章节顺序</div>
          </div>
        </article>
      </div>
    </section>
    <section class="stage ts-bg-dark-grid">
      <div class="ts-article-scene ts-split-media-layout">
        <article class="ts-card-image-evidence">
          <div class="ts-source-media"><img src="../../../assets/previews/tech-signal.png" alt="科技模板预览截图" /></div>
          <div class="ts-media-copy">
            <div class="ts-eyebrow">Evidence Panel</div>
            <div class="ts-media-caption">图像在左，论证在右</div>
            <div class="ts-media-meta">这张界面截图说明：来源图片可以嵌入正文，而不是成为主题背景。</div>
          </div>
        </article>
      </div>
    </section>
  </body>
</html>
