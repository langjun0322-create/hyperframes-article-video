<!-- hyperframes-registry-item: logo-outro -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Logo Outro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=block" rel="stylesheet" />
    <script src="../../assets/gsap.min.js"></script>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      html,body { margin:0; width:1920px; height:1080px; overflow:hidden; background:#05070A; font-family:"Inter",sans-serif; }
    </style>
  </head>
  <body>
    <div id="logo-outro" data-composition-id="logo-outro" data-width="1920" data-height="1080" data-start="0" data-duration="6">
      <div class="canvas">
        <!-- Glow — positioned at logo center, sized to aura -->
        <div class="logo-glow"></div>
        <!-- Logo container — centered -->
        <div class="logo-container">
          <svg class="logo-svg" viewBox="0 0 1468 1244" xmlns="http://www.w3.org/2000/svg">
            <path class="logo-piece logo-j" d="M 755 39 L 372 41 L 370 251 L 553 255 L 553 903 L 540 943 L 507 973 L 478 986 L 285 989 L 275 985 L 266 966 L 267 777 L 37 777 L 36 997 L 129 1112 L 144 1124 L 148 1135 L 174 1161 L 174 1167 L 207 1207 L 601 1207 L 724 1047 L 725 1038 L 760 999 L 761 44 Z" fill="#D5BEA9" />
            <path class="logo-piece logo-e" d="M 825 40 L 824 1205 L 1388 1207 L 1386 989 L 1028 988 L 1027 346 L 1031 264 L 1388 264 L 1390 41 Z" fill="#D5BEA9" />
            <path class="logo-piece logo-tri" d="M 1091 390 L 1093 835 L 1431 611 Z" fill="#D73C0D" />
          </svg>
        </div>
        <div class="text-container">
          <div class="tagline">JunEr Visual Lab</div>
          <div class="url-pill"><span class="url-text">@JunEr</span></div>
        </div>
      </div>
      <style>
        [data-composition-id="logo-outro"] .canvas { width:1920px; height:1080px; background:#05070A; position:relative; overflow:hidden; font-family:"Inter",sans-serif; }
        [data-composition-id="logo-outro"] .logo-container { position:absolute; left:780px; top:370px; width:360px; height:auto; z-index:2; }
        [data-composition-id="logo-outro"] .logo-svg { width:100%; height:auto; display:block; }
        [data-composition-id="logo-outro"] .logo-piece { transform-origin:center center; }
        /* Glow: 500px circle, centered at logo center (960, 520) */
        [data-composition-id="logo-outro"] .logo-glow {
          position:absolute; left:710px; top:270px; width:500px; height:500px;
          background:radial-gradient(circle,rgba(0,213,255,0.1) 0%,rgba(5,7,10,0) 70%);
          border-radius:50%; pointer-events:none; z-index:1;
          opacity:0;  /* invisible until GSAP takes over at 1.1s */
        }
        [data-composition-id="logo-outro"] .text-container { position:absolute; top:710px; width:100%; display:flex; flex-direction:column; align-items:center; z-index:3; }
        [data-composition-id="logo-outro"] .tagline { font-size:26px; font-weight:500; color:#EAF2FF; text-align:center; letter-spacing:4px; }
        [data-composition-id="logo-outro"] .url-pill { background:rgba(11,17,24,0.8); border:1px solid rgba(0,213,255,0.15); border-radius:100px; padding:6px 18px; display:flex; align-items:center; justify-content:center; margin-top:16px; }
        [data-composition-id="logo-outro"] .url-text { font-size:15px; color:#00D5FF; letter-spacing:0.5px; }
      </style>
      <script>
        (function(){
          try {
            const tl = gsap.timeline({paused:true});
            const pieces = {
              j:   '[data-composition-id="logo-outro"] .logo-j',
              e:   '[data-composition-id="logo-outro"] .logo-e',
              tri: '[data-composition-id="logo-outro"] .logo-tri',
            };
            const pieceArray = [pieces.j, pieces.e, pieces.tri];
            const logoGlow = '[data-composition-id="logo-outro"] .logo-glow';
            const tagline = '[data-composition-id="logo-outro"] .tagline';
            const urlPill = '[data-composition-id="logo-outro"] .url-pill';

            // 1. Pieces slide in from right (stagger)
            pieceArray.forEach((p,i) => {
              tl.fromTo(p, {x:1920,opacity:0}, {x:0,opacity:1,duration:1.2,ease:"power4.out"}, i*0.08);
            });

            // 2. Pieces arrive, glow blooms (timed with pulse)
            const pulseTime = 1.2;
            // Glow starts small and blooms as pieces arrive
            tl.fromTo(logoGlow, {opacity:0,scale:0.3}, {opacity:1,scale:1.2,duration:0.35,ease:"power2.out"}, pulseTime - 0.1);
            // Glow fades out as pulse contracts
            tl.to(logoGlow, {opacity:0,scale:1.5,duration:0.8,ease:"power2.out"}, pulseTime + 0.25);

            // 3. Pieces pulse together with glow
            tl.to(pieceArray, {scale:1.1,duration:0.35,ease:"back.out(1.7)",stagger:0.02}, pulseTime);
            tl.to(pieceArray, {scale:1,duration:0.25,ease:"power2.inOut"}, pulseTime + 0.25);

            // 4. Tagline and URL fade in
            const ts = pulseTime + 0.6;
            tl.fromTo(tagline,{opacity:0,y:20},{opacity:1,y:0,duration:0.8,ease:"power3.out"}, ts);
            tl.fromTo(urlPill,{opacity:0,y:15},{opacity:1,y:0,duration:0.6,ease:"power3.out"}, ts+0.3);

            window.__timelines = window.__timelines || {};
            window.__timelines["logo-outro"] = tl;
          } catch(e) {
            document.querySelectorAll('.logo-piece').forEach(el => { el.style.opacity = 1; });
          }
        })();
      </script>
    </div>
  </body>
</html>
