<!-- hyperframes-registry-item: tiktok-follow -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=block" rel="stylesheet" />
    <script src="../../assets/gsap.min.js"></script>
    <style>
      * { margin:0; padding:0; }
      html,body { background:#05070A; overflow:hidden; }
      body { width:1920px; height:1080px; font-family:"Inter",sans-serif; }
      #bg-gradient { position:absolute; inset:0; background:linear-gradient(135deg,#05070A 0%,#0B1118 50%,#101820 100%); }
      #bg-grid { position:absolute; inset:0; background-image:linear-gradient(rgba(0,213,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,213,255,0.03) 1px,transparent 1px); background-size:60px 60px; }
      #bg-radial { position:absolute; inset:0; background:radial-gradient(ellipse at 50% 50%,rgba(0,213,255,0.05) 0%,transparent 70%); }
      [data-composition-id="tiktok-follow"] .follow-card { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); display:flex; align-items:center; gap:36px; background:rgba(11,17,24,0.85); backdrop-filter:blur(20px); border:1px solid rgba(0,213,255,0.12); border-radius:100px; padding:28px 46px 28px 28px; box-shadow:0 12px 60px rgba(0,213,255,0.06); }
      [data-composition-id="tiktok-follow"] .avatar { width:90px; height:90px; border-radius:50%; object-fit:cover; flex-shrink:0; border:2px solid rgba(0,213,255,0.15); }
      [data-composition-id="tiktok-follow"] .profile-info { display:flex; flex-direction:column; gap:4px; }
      [data-composition-id="tiktok-follow"] .display-name { font-size:32px; font-weight:700; color:#EAF2FF; }
      [data-composition-id="tiktok-follow"] .handle { font-size:22px; font-weight:500; color:#00D5FF; }
      [data-composition-id="tiktok-follow"] .follow-btn { width:160px; height:58px; border-radius:29px; background:linear-gradient(135deg,#00D5FF,#3A7BFF); flex-shrink:0; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
      [data-composition-id="tiktok-follow"] .btn-text { position:absolute; font-size:22px; font-weight:700; color:#fff; white-space:nowrap; }
      [data-composition-id="tiktok-follow"] .btn-text-follow { opacity:1; }
      [data-composition-id="tiktok-follow"] .btn-text-following { opacity:0; display:flex; align-items:center; gap:6px; }
      [data-composition-id="tiktok-follow"] .check-icon { display:inline-block; width:18px; height:18px; }
      [data-composition-id="tiktok-follow"] .check-icon svg { width:18px; height:18px; display:block; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="tiktok-follow" data-width="1920" data-height="1080" data-start="0" data-duration="5">
      <div id="bg-gradient"></div>
      <div id="bg-grid"></div>
      <div id="bg-radial"></div>
      <div id="card" class="follow-card" data-start="0" data-duration="5" data-track-index="0">
        <img class="avatar" src="assets/logo-new.svg" alt="JunEr" />
        <div class="profile-info">
          <div class="display-name">JunEr</div>
          <div class="handle">@JunEr</div>
        </div>
        <div id="follow-btn" class="follow-btn">
          <span id="btn-follow" class="btn-text btn-text-follow">关注</span>
          <span id="btn-following" class="btn-text btn-text-following">
            <span>已关注</span>
            <span class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
          </span>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({paused:true});
      var card = document.getElementById("card");
      var btn = document.getElementById("follow-btn");
      var textFollow = document.getElementById("btn-follow");
      var textFollowing = document.getElementById("btn-following");
      tl.from("#bg-radial", {opacity:0,duration:0.6,ease:"power2.out"}, 0);
      gsap.set(card, {y:200, opacity:0});
      tl.to(card, {y:0, opacity:1, duration:0.5, ease:"power3.out"}, 0.15);
      tl.to(btn, {scale:0.92, duration:0.12, ease:"power2.out"}, 1.2);
      tl.to(btn, {scale:1, duration:0.35, ease:"elastic.out(1,0.4)"}, 1.32);
      tl.to(btn, {background:"rgba(11,17,24,0.6)", border:"1px solid rgba(0,213,255,0.2)", duration:0.1, ease:"none"}, 1.32);
      tl.to(textFollow, {opacity:0, duration:0.06, ease:"none"}, 1.32);
      tl.to(textFollowing, {opacity:1, duration:0.06, ease:"none"}, 1.38);
      tl.to(card, {y:200, opacity:0, duration:0.25, ease:"power3.in"}, 4.2);
      window.__timelines["tiktok-follow"] = tl;
    </script>
  </body>
</html>
